version: '3.9'
services:
  postgres:
    image: postgres:16
    container_name: smartexam-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: smartexam_dev_db
    ports:
      - '5433:5432'
    volumes:
      - smartexam_pgdata:/var/lib/postgresql/data

volumes:
  smartexam_pgdata:
